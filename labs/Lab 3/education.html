<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Education - Sebastian's Resume</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="animated-bg"></div>
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="container">
    <a href="index.html" class="back-btn">← Home</a>
    
    <h1 class="page-title">🎓 Education</h1>
    
    <div class="timeline">
      <div class="timeline-item slide-in-left">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <div class="edu-card">
            <div class="year-badge">2024</div>
            <h2>High School Diploma</h2>
            <h3>Success Academy High School of the Liberal Arts</h3>
            <div class="achievement-badge">Graduated</div>
          </div>
        </div>
      </div>
      
      <div class="timeline-item slide-in-right">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <div class="edu-card">
            <div class="year-badge current">2024 - 2028</div>
            <h2>Bachelor's Degree</h2>
            <h3>Rensselaer Polytechnic Institute</h3>
            <div class="achievement-badge current-badge">In Progress</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
