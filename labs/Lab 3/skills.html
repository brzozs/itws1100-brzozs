<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skills - Sebastian's Resume</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="animated-bg"></div>
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="container">
    <a href="index.html" class="back-btn">← Home</a>
    
    <h1 class="page-title">⚡ Skills</h1>
    
    <div class="skills-grid">
      <div class="skill-category">
        <h2 class="category-title">💻 Technical Skills</h2>
        <div class="skill-bars">
          <div class="skill-item">
            <div class="skill-label">
              <span>Front-End Web Development</span>
              <span class="skill-level">Advanced</span>
            </div>
            <div class="skill-bar">
              <div class="skill-fill" style="--skill-width: 85%"></div>
            </div>
          </div>
          
          <div class="skill-item">
            <div class="skill-label">
              <span>JavaScript</span>
              <span class="skill-level">Proficient</span>
            </div>
            <div class="skill-bar">
              <div class="skill-fill" style="--skill-width: 75%"></div>
            </div>
          </div>
          
          <div class="skill-item">
            <div class="skill-label">
              <span>C++</span>
              <span class="skill-level">Intermediate</span>
            </div>
            <div class="skill-bar">
              <div class="skill-fill" style="--skill-width: 65%"></div>
            </div>
          </div>
          
          <div class="skill-item">
            <div class="skill-label">
              <span>Python</span>
              <span class="skill-level">Proficient</span>
            </div>
            <div class="skill-bar">
              <div class="skill-fill" style="--skill-width: 80%"></div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="skill-category">
        <h2 class="category-title">🎯 Professional Skills</h2>
        <div class="skill-tags">
          <span class="skill-tag">Leadership</span>
          <span class="skill-tag">Public Speaking</span>
          <span class="skill-tag">Strategic Communication</span>
          <span class="skill-tag">Team Collaboration</span>
          <span class="skill-tag">Microsoft Workspace</span>
        </div>
      </div>
      
      <div class="skill-category">
        <h2 class="category-title">🌍 Languages</h2>
        <div class="language-cards">
          <div class="language-card">
            <div class="flag">🇵🇱</div>
            <h3>Polish</h3>
            <p>Fluent</p>
          </div>
          <div class="language-card">
            <div class="flag">🇺🇸</div>
            <h3>English</h3>
            <p>Fluent</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
